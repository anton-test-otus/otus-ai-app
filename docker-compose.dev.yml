# Dev overlay (DOCKER_ENV=dev): hot reload backend + Vite на :5173.
# Запуск: make up  или  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  php:
    volumes:
      - ./backend:/var/www/backend

  nginx:
    build: !reset null
    image: nginx:alpine
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

  node:
    image: node:22-alpine
    container_name: ${APP_NAME:-otus_ai}_node
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./volumes/${APP_NAME:-otus_ai}/node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - app_network
    env_file:
      - ./frontend/.env
