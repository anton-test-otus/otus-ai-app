name: Build artifacts

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      vite_auth_enabled:
        description: VITE_AUTH_ENABLED for frontend build (false = single-user)
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: write

jobs:
  frontend:
    name: Frontend dist
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build production assets
        env:
          VITE_API_URL: /api
          VITE_AUTH_ENABLED: ${{ inputs.vite_auth_enabled || 'false' }}
        run: npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 30
          if-no-files-found: error

  publish-dist:
    name: Publish dist
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend-dist

      - name: Push to dist branch
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin refs/heads/dist >/dev/null 2>&1; then
            git fetch origin dist
            git checkout dist
          else
            git fetch origin main
            git checkout -B dist origin/main
          fi

          rm -rf frontend/dist
          mkdir -p frontend
          cp -a /tmp/frontend-dist/. frontend/dist/
          echo "$SOURCE_SHA" > .dist-source-sha

          git add -f frontend/dist .dist-source-sha

          if git diff --staged --quiet; then
            echo "No changes in frontend dist; skipping push"
            exit 0
          fi

          git commit -m "chore(ci): update frontend dist from ${SOURCE_SHA}"
          git push origin HEAD:refs/heads/dist

      - name: Build summary
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "### frontend dist" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`dist\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source SHA: \`${SOURCE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
