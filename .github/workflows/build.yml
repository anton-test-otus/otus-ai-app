name: Build artifacts

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      vite_auth_enabled:
        description: VITE_AUTH_ENABLED for frontend build (false = single-user)
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  frontend:
    name: Frontend dist
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build production assets
        env:
          VITE_API_URL: /api
          VITE_AUTH_ENABLED: ${{ inputs.vite_auth_enabled || 'false' }}
        run: npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 30
          if-no-files-found: error

  publish-dist:
    name: Publish dist (PR → dist)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Ensure dist branch exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code origin refs/heads/dist >/dev/null 2>&1; then
            echo "dist branch already exists"
          else
            git push origin "HEAD:refs/heads/dist"
            echo "Created dist branch from current SHA"
          fi

      - name: Stage dist for PR
        run: |
          echo "${{ github.event.workflow_run.head_sha || github.sha }}" > .dist-source-sha
          git add -f frontend/dist .dist-source-sha

      - name: Create PR to dist branch
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/frontend-dist
          base: dist
          title: chore(ci): update frontend dist
          body: |
            Auto-generated after successful CI on `main`.

            Source SHA: `${{ github.event.workflow_run.head_sha || github.sha }}`
          commit-message: chore(ci): update frontend dist from ${{ github.event.workflow_run.head_sha || github.sha }}
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash

      - name: Build summary
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "### frontend dist" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: ${{ steps.cpr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target branch: \`dist\` (auto-merge)" >> "$GITHUB_STEP_SUMMARY"
