name: Build artifacts

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      vite_auth_enabled:
        description: VITE_AUTH_ENABLED for frontend build (false = single-user)
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

env:
  COMPOSE_PROJECT_NAME: otus-ai-app

jobs:
  frontend:
    name: Frontend dist
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build production assets
        env:
          VITE_API_URL: /api
          VITE_AUTH_ENABLED: ${{ inputs.vite_auth_enabled || 'false' }}
        run: npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 30
          if-no-files-found: error

  docker:
    name: Docker images (${{ matrix.image }})
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nginx
            image: nginx
          - service: php
            image: php
          - service: cron
            image: cron
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: meta
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "tag=ghcr.io/${owner}/otus-ai-app/${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker compose build ${{ matrix.service }}

      - name: Tag and push
        env:
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          local_tag="${COMPOSE_PROJECT_NAME}-${{ matrix.service }}"
          remote_tag="${{ steps.meta.outputs.tag }}"
          docker tag "${local_tag}" "${remote_tag}:${IMAGE_SHA}"
          docker tag "${local_tag}" "${remote_tag}:latest"
          docker push "${remote_tag}:${IMAGE_SHA}"
          docker push "${remote_tag}:latest"

      - name: Build summary
        env:
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "### ${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.tag }}:${IMAGE_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.tag }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
