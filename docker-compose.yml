version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: otus_postgres
    environment:
      POSTGRES_DB: otus_ai_db
      POSTGRES_USER: otus_user
      POSTGRES_PASSWORD: otus_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otus_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      DATABASE_URL: postgresql://otus_user:otus_password@postgres:5432/otus_ai_db?serverVersion=16&charset=utf8
    depends_on:
      - postgres
    networks:
      - otus_network

  nginx:
    image: nginx:alpine
    container_name: otus_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - otus_network

volumes:
  postgres_data:

networks:
  otus_network:
    driver: bridge
