# Demo (DOCKER_ENV=demo): SPA из frontend/dist + API, без сервиса node.
# Dev: make up при DOCKER_ENV=dev (overlay docker-compose.dev.yml + Vite :5173)

name: ${APP_NAME:-otus_ai}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-otus_ai}_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-otus_ai_db}
      POSTGRES_USER: ${DB_USER:-otus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-otus_password}
    volumes:
      - ./volumes/${APP_NAME:-otus_ai}/postgres/data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-otus_user} -d ${DB_NAME:-otus_ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ${APP_NAME:-otus_ai}-php
    container_name: ${APP_NAME:-otus_ai}_php
    working_dir: /var/www/backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-true}
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-owner@local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: ${APP_NAME:-otus_ai}-nginx
    container_name: ${APP_NAME:-otus_ai}_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - php
    networks:
      - app_network

  cron:
    image: ${APP_NAME:-otus_ai}-php
    container_name: ${APP_NAME:-otus_ai}_cron
    working_dir: /var/www/backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-true}
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-owner@local}
    depends_on:
      php:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "echo '0 0 * * * cd /var/www/backend && php bin/console app:cleanup-trash >> /var/log/cron.log 2>&1' | crontab - && crond -f -l 2"

networks:
  app_network:
    name: ${APP_NAME:-otus_ai}_network
    driver: bridge
