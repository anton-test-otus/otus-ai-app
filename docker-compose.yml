services:
  postgres:
    image: postgres:16-alpine
    container_name: otus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-otus_ai_db}
      POSTGRES_USER: ${DB_USER:-otus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-otus_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-otus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - otus_network

  nginx:
    image: nginx:alpine
    container_name: otus_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - otus_network

volumes:
  postgres_data:

networks:
  otus_network:
    driver: bridge
