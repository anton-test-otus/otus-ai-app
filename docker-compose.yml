# Production / demo: SPA из frontend/dist (сборка: make frontend-build / CI) + API (без сервиса node).
# Разработка с Vite: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: otus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-otus_ai_db}
      POSTGRES_USER: ${DB_USER:-otus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-otus_password}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - otus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-otus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_php
    working_dir: /var/www/backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-true}
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-owner@local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - otus_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: otus_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - php
    networks:
      - otus_network

  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_cron
    working_dir: /var/www/backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-true}
      SINGLE_USER_EMAIL: ${SINGLE_USER_EMAIL:-owner@local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - otus_network
    command: >
      sh -c "echo '0 0 * * * cd /var/www/backend && php bin/console app:cleanup-trash >> /var/log/cron.log 2>&1' | crontab - && crond -f -l 2"

networks:
  otus_network:
    driver: bridge
