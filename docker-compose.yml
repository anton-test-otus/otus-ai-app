services:
  postgres:
    image: postgres:16-alpine
    container_name: otus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-otus_ai_db}
      POSTGRES_USER: ${DB_USER:-otus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-otus_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-otus_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - otus_network

  nginx:
    image: nginx:alpine
    container_name: otus_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - otus_network

  node:
    image: node:22-alpine
    container_name: otus_node
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - otus_network
    environment:
      - VITE_API_URL=http://localhost:${APP_PORT:-8080}/api

  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: otus_cron
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - otus_network
    command: >
      sh -c "echo '0 0 * * * cd /var/www/backend && php bin/console app:cleanup-trash >> /var/log/cron.log 2>&1' | crontab - && crond -f -l 2"

volumes:
  postgres_data:
  node_modules:

networks:
  otus_network:
    driver: bridge
